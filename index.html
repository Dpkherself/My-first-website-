<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Clarity Facts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            margin-top: 50px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            background: #fff;
            border-radius: 10px;
            display: inline-block;
        }
        h1 {
            color: #2e4057;
        }
        p {
            font-size: 18px;
            margin: 20px 0;
            color: #333;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Random Business Clarity Facts</h1>
        <p id="fact">Click the button to see a random fact!</p>
        <button onclick="showRandomFact()">Show New Fact</button>
    </div>
    <script>
        const facts = [
            "Clarity is more important to customers than complexity.",
            "Businesses with clear goals are 42% more likely to succeed.",
            "Communicating a simple message improves customer engagement by 70%.",
            "Clear team roles improve productivity by 25%.",
            "A confused mind says 'no,' but clarity drives conversions.",
            "Strong brands focus on simplicity and clear messaging.",
            "Businesses with clear values retain employees longer on average."
        ];

        function showRandomFact() {
            const randomIndex = Math.floor(Math.random() * facts.length);
            const factParagraph = document.getElementById("fact");
            factParagraph.innerText = facts[randomIndex];
        }
    </script>
</body>
</html>
