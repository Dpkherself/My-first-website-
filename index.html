<!DOCTYPE html>
<html>
<head>
<title>Business Clarity Facts</title>
<style>
body {
background-color: #2d0057;
font-family: Arial, sans-serif;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
min-height: 100vh;
margin: 0;
padding: 20px;
}
h1 {
color: #d4aaff;
text-align: center;
font-size: 28px;
}
.card {
background-color: #ffffff;
border-radius: 16px;
padding: 24px;
max-width: 500px;
width: 100%;
text-align: center;
margin: 20px 0;
box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.card p {
color: #2d0057;
font-size: 18px;
font-weight: bold;
}
button {
background-color: #7b2fff;
color: white;
border: none;
padding: 14px 32px;
border-radius: 30px;
font-size: 16px;
cursor: pointer;
margin-top: 10px;
}
button:hover {
background-color: #5a00e0;
}
.credit {
color: #d4aaff;
margin-top: 30px;
font-size: 13px;
}
</style>
</head>
<body>
<h1>✨ Business Clarity Facts ✨</h1>
<div class="card">
<p id="fact">Click the button to get your business clarity tip!</p>
</div>
<button onclick="showFact()">Give Me a Clarity Tip 💡</button>
<p class="credit">Built by DPK Herself | Business Clarity & Strategy Specialist</p>
<script>
const facts = [
"Clarity is not a luxury — it is the foundation of every successful business.",
"Before you market anything, get clear on who you serve and what problem you solve.",
"Revenue consistency starts with offer clarity. Confused offers create confused buyers.",
"Your strategy should reflect your values, not just your goals.",
"A business without clarity is just busy work dressed up as progress.",
"The clearest communicator in the room always wins the client.",
"You cannot scale confusion. Get clear first, then grow.",
"Done is not always better than perfect — sometimes clarity is better than both."
];
function showFact() {
const random = Math.floor(Math.random() * facts.length);
document.getElementById("fact").textContent = facts[random];
}
</script>
</body>
</html>
